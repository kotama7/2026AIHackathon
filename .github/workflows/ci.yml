name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# 同じ PR / ブランチへの新 push があれば古い run をキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install (cache deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # pnpm 11.5+ は Node 22.13+ 必須。Functions の deploy runtime (Node 20) とは別軸
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # pnpm 11.5+ は Node 22.13+ 必須。Functions の deploy runtime (Node 20) とは別軸
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  format:
    name: Format check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # pnpm 11.5+ は Node 22.13+ 必須。Functions の deploy runtime (Node 20) とは別軸
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # pnpm 11.5+ は Node 22.13+ 必須。Functions の deploy runtime (Node 20) とは別軸
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # pnpm 11.5+ は Node 22.13+ 必須。Functions の deploy runtime (Node 20) とは別軸
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  functions-test:
    name: Functions unit tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # pnpm 11.5+ は Node 22.13+ 必須。Functions の deploy runtime (Node 20) とは別軸
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @village/functions test

  rules-test:
    name: Firestore rules test (emulator)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # pnpm 11.5+ は Node 22.13+ 必須。Functions の deploy runtime (Node 20) とは別軸
          node-version: '22'
          cache: pnpm
      # firebase-tools 15+ は Java 21+ 必須 (Firestore emulator のため)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --frozen-lockfile
      # firebase.json の hosting (apps/web の Next.js webframeworks) を firebase-tools@15 が
      # parse するには webframeworks experiment が必要。--only firestore,auth でも config 検証で
      # 落ちるため env で有効化する (hosting emulator 自体は起動しない)。
      - run: pnpm dlx firebase-tools@15 emulators:exec --only firestore,auth "pnpm --filter @village/functions test:rules"
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
