packages:
  - 'apps/*'
  - 'functions'
  - 'packages/*'

# postinstall (build script) を持つ依存の扱いを明示する。
# pnpm 11.5 は未決定の build script があると [ERR_PNPM_IGNORED_BUILDS] で exit 1 する
# (CI の `pnpm install --frozen-lockfile` が落ちる)。pnpm が要求する allowBuilds マップで
# 各パッケージを true (ビルド許可) / false (ビルド無視) として明示的に決定する。
# - esbuild: functions のバンドルに必要なネイティブバイナリ → 許可
# - sharp: Next.js image optimization 用のネイティブバイナリ → 許可
# - unrs-resolver: typescript-eslint の native bindings → 許可
# - @firebase/util, protobufjs: notice script のみ → 許可 (無害)
allowBuilds:
  '@firebase/util': true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
