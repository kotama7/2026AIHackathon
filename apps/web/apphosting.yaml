# Firebase App Hosting 設定 (apps/web)。
# 旧 Hosting webframeworks は pnpm モノレポで npm ci lock バグ (firebase-tools #9562/#9682) があり
# 新規参加終了。後継の App Hosting はモノレポ/SSR を正式サポートするためこちらへ移行。
#
# バックエンド作成: firebase apphosting:backends:create --project aihackathon-8b383
#   - root directory には apps/web を指定
#   - 追跡ブランチ (main 等) を指定すると push で自動ロールアウト

runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 512

# NEXT_PUBLIC_* は Next.js のビルド時にインライン化されるため BUILD でも利用可能にする。
# これらは Firebase Web 設定 (クライアントに公開される公開値) なので秘匿不要。
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCevOxi1ngjsxXRxZ6wcd78ZA_W5Co4lNQ
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: aihackathon-8b383.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: aihackathon-8b383
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: aihackathon-8b383.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: '820514003058'
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:820514003058:web:60c26696dd04e5ef964aeb
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-3PWRB4JQTY
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_USE_EMULATOR
    value: 'false'
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_USE_MOCK
    value: 'false'
    availability: [BUILD, RUNTIME]
